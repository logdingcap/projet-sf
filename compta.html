<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Comptabilité - SGVF</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <header>
        <h1>SGVF - Espace Comptabilité</h1>
        <div id="user-info">
            Connecté en tant que : Comptabilité
            <button onclick="window.location.href='index.html'" class="btn-small">Déconnexion</button>
        </div>
    </header>

    <main>
        <section id="compta-section">
            <h2>Mise en paiement</h2>
            
            <div class="card">
                <h3>Lot de factures certifiées à payer</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Fichier PDF Certifié</th>
                            <th>Formateur</th>
                            <th>Montant</th>
                            <th>Date limite de virement</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-compta">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
